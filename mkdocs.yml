site_name: Catford Green
site_url: https://catfordgreen.org.uk/
repo_name: catfordgreen/website
repo_url: https://github.com/catfordgreen/website
edit_uri: edit/main/docs/
site_description: Resident-led guide to Catford Green in Lewisham.
site_author: Catford Green residents

nav:
  - Home: index.md
  - Buildings:
    - Abbey Court: abbey-court/index.md
    - Appleby Court: appleby-court/index.md
    - Burgess Court: burgess-court/index.md
    - Dempsey Court: dempsey-court/index.md
    - Dixie Court: dixie-court/index.md
    - Dunstone Court: dunstone-court/index.md
    - Ferdinand Court: ferdinand-court/index.md
    - Firgrove Court: firgrove-court/index.md
    - Grosvenor Court: grosvenor-court/index.md
    - Harlie Court: harlie-court/index.md
    - Lawrence Court: lawrence-court/index.md
    - Westmead Court: westmead-court/index.md
  - Living here:
    - Overview: living-here.md
    - Families and childcare: childcare.md
    - Outdoor: outdoor.md
    - Community Garden: community-garden.md
  - Community:
    - Residents Associations: residents-association.md

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: green
      accent: amber
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - toc.follow
    - content.action.edit
    - content.code.copy
    - announce.dismiss

extra:
  social:
    - icon: fontawesome/brands/facebook
      link: https://www.facebook.com/groups/437613156430168

markdown_extensions:
  - admonition
  - footnotes
  - pymdownx.magiclink
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.gemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - privacy
  - search
  - macros
  - social:
      enabled: true